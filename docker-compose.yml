services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feature-flags-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feature-flags-frontend
    ports:
      - "3000:80"
    depends_on:
      - api