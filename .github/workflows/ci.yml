name: CI/CD Feature Flags API

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Lint
        run: dotnet format --verify-no-changes --no-restore

      - name: Test
        run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage" --settings coverlet.runsettings

      - name: Coverage report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: '**/coverage.cobertura.xml'
          badge: true
          format: markdown
          output: both

      - name: Add coverage to PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  deploy:
    name: Deploy to Scaleway
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Registry
        run: |
          docker login ${{ secrets.SCW_REGISTRY }} \
            -u nologin \
            --password-stdin <<< "${{ secrets.SCW_SECRET_KEY }}"

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.SCW_REGISTRY }}/${{ secrets.SCW_CONTAINER_NAME }}:${{ github.ref_name }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.SCW_REGISTRY }}/${{ secrets.SCW_CONTAINER_NAME }}:${{ github.ref_name }}

      - name: Deploy container on Scaleway
        run: |
          curl -s -X POST \
            -H "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"redeploy": true}' \
            "https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers/${{ secrets.SCW_CONTAINER_ID }}/deploy"

      - name: Verify deployment
        run: |
          sleep 30
          curl -f ${{ secrets.SCW_CONTAINER_URL }}/api/health